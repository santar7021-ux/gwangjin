<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script>
(function(){
  // Apps Script iframe viewport 강제 적용
  var vp = document.querySelector('meta[name=viewport]');
  if(!vp){ vp = document.createElement('meta'); vp.name='viewport'; document.head.appendChild(vp); }
  vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
  // 화면 너비 강제 설정
  document.documentElement.style.cssText = 'width:100%!important;max-width:100vw!important;overflow-x:hidden!important;';
  document.addEventListener('DOMContentLoaded', function(){
    document.body.style.cssText += ';width:100%!important;overflow-x:hidden!important;max-width:100vw!important;';
    var app = document.querySelector('.app');
    if(app){ app.style.cssText += ';width:100%!important;max-width:480px!important;margin:0 auto!important;'; }
  });
})();
</script>

<title>광진농원 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{width:100%!important;max-width:100vw!important;overflow-x:hidden!important;background:#C8B898;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;-webkit-text-size-adjust:100%;}
body{width:100%!important;max-width:100vw!important;min-height:100vh;background:#C8B898;color:#2A1A0A;font-size:16px;display:flex;flex-direction:column;align-items:center;margin:0!important;padding:0!important;overflow-x:hidden!important;-webkit-text-size-adjust:100%;}
.app{width:100%!important;max-width:480px;min-height:100vh;background:#FAF8F4;box-shadow:0 0 40px rgba(0,0,0,.15);position:relative;margin:0 auto!important;overflow-x:hidden!important;}
:root{
  --br:#3B2A1A;--bm:#4A3828;
  --gn:#6A9050;--gl:#88B068;--gp:#EEF5E8;
  --cr:#FAF8F4;--cs:#F0EBE3;--bd:#D8CEC0;
  --rd:#C03020;--yw:#E8A020;
}

/* ── 헤더 ── */
.hero{position:relative;height:160px;overflow:hidden;background:#2A1A0A}
.hero-svg{position:absolute;inset:0;width:100%;height:100%}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,10,3,.45) 0%,rgba(30,18,8,.25) 50%,rgba(20,10,3,.65) 100%);pointer-events:none}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:0 18px 18px;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(200,151,58,.88);color:#3B2A1A;font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;letter-spacing:.8px;margin-bottom:7px}
.hero-title{font-family:Georgia,serif;color:#fff;font-size:20px;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,.5);line-height:1.2}
.hero-title em{color:#E8C870;font-style:normal}
.hero-gold-bar{height:3px;background:linear-gradient(90deg,transparent,#C8973A 25%,#E8B55A 50%,#C8973A 75%,transparent)}

/* ── 상단 상태바 ── */
.statusbar{
  background:var(--br);
  position:sticky;top:0;z-index:100;
  width:100%;
  border-bottom:2px solid rgba(106,144,80,.35);
  display:flex;flex-direction:column;
  padding:0;
left:0;right:0;}
.statusbar-top{
  display:flex;align-items:center;
  padding:7px 14px 6px;
  border-bottom:1px solid rgba(255,255,255,.06);
  gap:7px;
}
.statusbar-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0;transition:background .3s}
.status-dot.online{background:#6A9050;box-shadow:0 0 5px rgba(106,144,80,.7)}
.status-dot.checking{background:#E8A020;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-txt{
  font-size:11px;color:rgba(255,255,255,.65);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.new-badge{
  background:var(--rd);color:#fff;
  font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:8px;
  display:none;flex-shrink:0;white-space:nowrap;
}
.new-badge.show{display:inline-block;animation:badgePop .3s ease}
@keyframes badgePop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.statusbar-btns{
  display:flex;align-items:center;
  padding:7px 14px 8px;
  gap:6px;
}
.btn-refresh{
  border:1px solid rgba(255,255,255,.25);
  color:rgba(255,255,255,.7);background:none;
  border-radius:8px;padding:6px 10px;
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.btn-refresh:hover{background:rgba(255,255,255,.12)}

/* ── 탭 ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:600;color:#9A8870;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab.act{color:var(--br);border-bottom-color:var(--gn)}

/* ── 주문 카드 ── */
.order-list{padding:12px}
.order-card{background:#fff;border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:10px;transition:all .25s}
.order-card.new{border-color:var(--rd);box-shadow:0 0 0 2px rgba(192,48,32,.15)}
.order-card.done{opacity:.6}
.card-hd{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--cs)}
.card-hd.new{background:linear-gradient(90deg,rgba(192,48,32,.06),transparent)}
.card-hd.done{background:var(--cs)}
.card-hd-left{display:flex;align-items:center;gap:8px}
.card-status{font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;letter-spacing:.3px}
.card-status.new{background:rgba(192,48,32,.12);color:var(--rd)}
.card-status.done{background:rgba(106,144,80,.12);color:var(--gn)}
.card-no{font-size:11px;color:#9A8870}
.card-time{font-size:11px;color:#9A8870}
.card-body{padding:12px 14px}
.card-section{font-size:10px;font-weight:700;color:var(--gn);letter-spacing:.5px;margin-bottom:5px;margin-top:10px}
.card-section:first-child{margin-top:0}
.card-row{display:flex;font-size:13px;margin-bottom:4px}
.card-row:last-child{margin-bottom:0}
.card-k{color:#9A8870;min-width:58px;flex-shrink:0;font-size:12px}
.card-v{color:var(--br);font-weight:500;flex:1;word-break:keep-all}
.card-product{display:inline-flex;align-items:center;gap:5px;background:var(--gp);color:#3B5A28;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;margin-top:3px}
.card-foot{padding:10px 14px;border-top:1px solid var(--cs);display:flex;gap:7px}
.btn-confirm{flex:1;padding:11px;border:none;border-radius:10px;background:var(--br);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}
.btn-confirm:hover{background:var(--bm)}
.btn-confirm:disabled{background:#ccc;cursor:not-allowed}
.btn-confirmed{flex:1;padding:11px;border:1.5px solid var(--gn);border-radius:10px;background:var(--gp);color:#3B5A28;font-size:13px;font-weight:700;cursor:default;font-family:inherit}
.confirmed-time{font-size:11px;color:#9A8870;margin-top:3px;text-align:center}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:48px 20px;color:#9A8870}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-txt{font-size:14px}

/* ── 알림 토스트 ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#3B2A1A;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;border-left:4px solid #6A9050}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── 알림 팝업 ── */
.alert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;align-items:center;justify-content:center;padding:20px}
.alert-overlay.show{display:flex}
.alert-box{background:#fff;border-radius:18px;padding:24px 20px 20px;max-width:min(320px,calc(100vw - 32px));width:100%;text-align:center}
.alert-icon{font-size:40px;margin-bottom:10px}
.alert-title{font-size:17px;font-weight:800;color:var(--br);margin-bottom:8px}
.alert-body{font-size:13px;color:#5A4830;line-height:1.75;margin-bottom:18px}
.alert-btn{width:100%;padding:13px;border:none;border-radius:11px;background:var(--br);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ── 로딩 ── */
.loading{text-align:center;padding:32px;color:#9A8870;font-size:13px}

/* ── 매출 분석 버튼 ── */
.btn-sales{
  border:1px solid rgba(200,151,58,.6);
  color:#E8B55A;background:rgba(200,151,58,.12);
  border-radius:8px;padding:6px 10px;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
  white-space:nowrap;flex-shrink:0;flex:1;
  text-align:center;
}
.btn-sales:hover{background:rgba(200,151,58,.25);border-color:#E8B55A;}

/* ── 매출 분석 모달 ── */
.sales-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.58);z-index:9000;
  align-items:flex-start;justify-content:center;
  padding:16px;overflow-y:auto;
}
.sales-overlay.show{display:flex;}
.sales-modal{
  background:#FAF8F4;border-radius:18px;
  width:100%;max-width:min(420px,calc(100vw - 32px));
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.22);
  margin:auto;
}
.sales-modal-hd{
  background:linear-gradient(90deg,#3B2A1A,#5A4030);
  padding:16px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid rgba(200,151,58,.4);
}
.sales-modal-title{
  font-size:15px;font-weight:800;color:#fff;
  display:flex;align-items:center;gap:7px;
}
.sales-modal-close{
  border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);
  background:none;border-radius:8px;padding:4px 10px;
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
}
.sales-modal-close:hover{background:rgba(255,255,255,.12);}

.sales-summary{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;padding:14px 14px 10px;
}
.sales-sum-card{
  background:#fff;border:1px solid #D8CEC0;
  border-radius:12px;padding:12px 10px;text-align:center;
}
.sales-sum-label{font-size:10px;color:#9A8870;font-weight:600;margin-bottom:5px;letter-spacing:.3px;}
.sales-sum-value{font-size:17px;font-weight:800;color:#3B2A1A;line-height:1;}
.sales-sum-unit{font-size:10px;color:#9A8870;margin-top:3px;}

.sales-section-title{
  font-size:12px;font-weight:700;color:#6A9050;
  padding:4px 14px 6px;letter-spacing:.4px;
}
.sales-table-wrap{padding:0 14px 14px;overflow-x:auto;}
.sales-table{
  width:100%;border-collapse:collapse;
  font-size:12px;
}
.sales-table th{
  background:#F0EBE3;color:#5A4830;
  font-weight:700;font-size:11px;
  padding:8px 8px;text-align:center;
  border-bottom:1px solid #D8CEC0;
  letter-spacing:.2px;
}
.sales-table th:first-child{text-align:left;}
.sales-table td{
  padding:9px 8px;text-align:center;
  border-bottom:.5px solid #F0EBE3;
  color:#3B2A1A;
}
.sales-table td:first-child{text-align:left;font-weight:600;}
.sales-table tr:last-child td{border-bottom:none;}
.sales-table tr.total-row td{
  background:#EEF5E8;font-weight:800;color:#3B5A28;
  border-top:2px solid #6A9050;font-size:13px;
}
.sales-table .amount{font-weight:700;color:#3B2A1A;}
.sales-table .highlight{color:#C8973A;font-weight:800;}

.sales-order-list{padding:0 14px 14px;}
.sales-order-item{
  background:#fff;border:1px solid #D8CEC0;
  border-radius:10px;padding:11px 13px;margin-bottom:7px;
}
.sales-order-item:last-child{margin-bottom:0;}
.sales-order-hd{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
.sales-order-no{font-size:12px;font-weight:700;color:#3B2A1A;}
.sales-order-price{font-size:14px;font-weight:800;color:#6A9050;}
.sales-order-detail{font-size:11px;color:#9A8870;line-height:1.6;}
.sales-order-breakdown{
  display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;
}
.sales-order-tag{
  background:#EEF5E8;color:#3B5A28;
  font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:6px;
}

/* ── 카드에 금액 표시 ── */
.card-price{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(200,151,58,.12);border:1px solid rgba(200,151,58,.35);
  color:#8A6020;font-size:12px;font-weight:700;
  padding:3px 9px;border-radius:7px;margin-left:6px;
}

/* ── 관리자 메모 ── */
.card-memo-wrap{
  border-top:1px solid var(--cs);
  padding:10px 14px;
}
.card-memo-label{
  font-size:10px;font-weight:700;color:#9A8870;
  letter-spacing:.4px;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.card-memo-label span{color:#6A9050;}
.card-memo-input{
  width:100%;padding:9px 11px;
  border:1px solid #D8CEC0;border-radius:9px;
  font-size:13px;color:#2A1A0A;
  background:#FAF8F4;font-family:inherit;
  outline:none;resize:none;min-height:58px;
  line-height:1.6;transition:border-color .15s;
}
.card-memo-input:focus{border-color:#6A9050;background:#fff;}
.card-memo-input::placeholder{color:#C0B0A0;font-size:12px;}
.card-memo-row{display:flex;gap:7px;margin-top:7px;align-items:center;}
.btn-memo-save{
  padding:7px 14px;border:none;border-radius:8px;
  background:#6A9050;color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.btn-memo-save:hover{background:#3B5A28;}
.btn-memo-save:disabled{background:#ccc;cursor:not-allowed;}
.card-memo-saved{
  font-size:11px;color:#6A9050;
  display:none;align-items:center;gap:3px;
}
.card-memo-saved.show{display:flex;}

/* ── 날짜 필터 버튼 ── */
.btn-date-filter{
  border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);
  border-radius:8px;padding:6px 10px;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
  white-space:nowrap;flex-shrink:0;flex:1;
  text-align:center;
}
.btn-date-filter:hover{background:rgba(255,255,255,.18);}
.btn-date-filter.active{
  background:rgba(26,36,86,.35);
  border-color:rgba(106,144,80,.7);
  color:#88B068;
}

/* ── 날짜 필터 드롭다운 패널 ── */
.date-panel-overlay{
  display:none;position:fixed;inset:0;z-index:8000;
}
.date-panel-overlay.show{display:block;}
.date-panel{position:fixed;top:auto;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border:1px solid #D8CEC0;border-radius:16px 16px 0 0;padding:18px 16px 32px;box-shadow:0 -4px 24px rgba(0,0,0,.15);z-index:8001;}
.date-panel-title{
  font-size:12px;font-weight:700;color:#3B2A1A;
  margin-bottom:10px;letter-spacing:.3px;
}
.date-quick-btns{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;
}
.dqb{
  padding:6px 11px;border:1px solid #D8CEC0;
  border-radius:8px;font-size:12px;font-weight:600;
  color:#5A4830;background:#FAF8F4;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.dqb:hover{border-color:#6A9050;color:#3B5A28;}
.dqb.sel{background:#3B2A1A;color:#fff;border-color:#3B2A1A;}
.date-range-row{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
}
.date-range-row input[type=date]{
  flex:1;padding:7px 9px;
  border:1px solid #D8CEC0;border-radius:8px;
  font-size:12px;color:#2A1A0A;background:#FAF8F4;
  font-family:inherit;outline:none;-webkit-appearance:none;
}
.date-range-row input[type=date]:focus{border-color:#6A9050;}
.date-range-sep{font-size:12px;color:#9A8870;flex-shrink:0;}
.date-panel-btns{display:flex;gap:7px;}
.btn-date-apply{
  flex:1;padding:9px;border:none;border-radius:9px;
  background:#3B2A1A;color:#fff;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;
}
.btn-date-apply:hover{background:#4A3828;}
.btn-date-reset{
  padding:9px 13px;border:1px solid #D8CEC0;border-radius:9px;
  background:#FAF8F4;color:#5A4830;
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
}
.btn-date-reset:hover{background:#F0EBE3;}

/* ── 날짜 그룹 헤더 ── */
.date-group-hd{
  display:flex;align-items:center;gap:8px;
  padding:8px 4px 5px;margin-top:4px;
}
.date-group-hd::before,.date-group-hd::after{
  content:'';flex:1;height:1px;background:#D8CEC0;
}
.date-group-hd span{
  font-size:11px;font-weight:700;color:#9A8870;
  white-space:nowrap;padding:2px 8px;
  background:#FAF8F4;border-radius:8px;
  border:1px solid #D8CEC0;
}
.date-filter-badge{
  display:none;
  background:#6A9050;color:#fff;
  font-size:9px;font-weight:800;
  padding:1px 5px;border-radius:5px;
  margin-left:3px;vertical-align:middle;
}
.date-filter-badge.show{display:inline;}

@media (max-width: 480px) {
  html, body { background: #FAF8F4 !important; }
  .app { box-shadow: none !important; }
  .sales-modal { margin: 0; border-radius: 18px 18px 0 0; }
  .sales-overlay { align-items: flex-end; }
}

/* ── 재고 관리 ── */
.inv-wrap{padding:12px;}
.inv-card{background:#fff;border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.inv-card-hd{
  background:linear-gradient(90deg,#3B2A1A,#5A4030);
  padding:11px 15px;
  display:flex;align-items:center;justify-content:space-between;
}
.inv-card-title{font-size:13px;font-weight:700;color:#fff;}
.inv-card-body{padding:14px 15px;}
.inv-row{
  display:flex;align-items:center;gap:8px;
  padding:9px 0;border-bottom:1px solid var(--cs);
}
.inv-row:last-child{border:none;}
.inv-row-left{flex:1;min-width:0;}
.inv-prod-name{font-size:14px;font-weight:700;color:var(--br);margin-bottom:3px;}
.inv-prod-price{font-size:11px;color:var(--ts);}
.inv-stock-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--bd);border-radius:9px;overflow:hidden;background:var(--cr);flex-shrink:0;}
.inv-stock-btn{width:32px;height:34px;border:none;background:none;font-size:16px;color:var(--gn);cursor:pointer;font-family:inherit;font-weight:700;display:flex;align-items:center;justify-content:center;}
.inv-stock-btn:hover{background:var(--gp);}
.inv-stock-input{width:52px;height:34px;border:none;border-left:1px solid var(--bd);border-right:1px solid var(--bd);text-align:center;font-size:14px;font-weight:700;color:var(--br);background:#fff;font-family:inherit;outline:none;}
.inv-visible-toggle{
  width:40px;height:22px;border-radius:11px;
  border:none;cursor:pointer;
  position:relative;transition:background .2s;
  flex-shrink:0;
}
.inv-visible-toggle.on{background:var(--gn);}
.inv-visible-toggle.off{background:#ccc;}
.inv-visible-toggle::after{
  content:'';position:absolute;
  width:18px;height:18px;border-radius:50%;background:#fff;
  top:2px;transition:left .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.inv-visible-toggle.on::after{left:20px;}
.inv-visible-toggle.off::after{left:2px;}
.inv-toggle-label{font-size:10px;color:var(--ts);flex-shrink:0;}

/* 신규 상품 추가 폼 */
.inv-add-form{
  background:var(--gp);border:1px solid rgba(106,144,80,.3);
  border-radius:12px;padding:13px;margin-bottom:10px;
}
.inv-add-title{font-size:12px;font-weight:700;color:#3B5A28;margin-bottom:10px;}
.inv-field{margin-bottom:8px;}
.inv-field:last-of-type{margin-bottom:0;}
.inv-label{font-size:11px;font-weight:600;color:var(--ts);margin-bottom:4px;display:block;}
.inv-input{
  width:100%;padding:9px 11px;
  border:1px solid var(--bd);border-radius:8px;
  font-size:14px;color:var(--br);
  background:#fff;font-family:inherit;outline:none;
}
.inv-input:focus{border-color:var(--gn);}
.inv-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-inv-add{
  width:100%;padding:11px;border:none;border-radius:10px;
  background:var(--br);color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:10px;transition:all .15s;
}
.btn-inv-add:hover{background:#4A3828;}
.btn-inv-save{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:var(--gn);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all .15s;position:sticky;bottom:12px;
  box-shadow:0 2px 12px rgba(106,144,80,.35);
}
.btn-inv-save:hover{background:#3B5A28;}
.inv-stock-badge{
  display:inline-block;padding:2px 7px;
  border-radius:6px;font-size:11px;font-weight:700;
}
.inv-stock-badge.ok{background:var(--gp);color:#3B5A28;}
.inv-stock-badge.low{background:#FFF0E8;color:#C04020;}
.inv-stock-badge.zero{background:#FFF0F0;color:#C03020;}
.inv-save-msg{
  font-size:12px;color:var(--gn);text-align:center;
  padding:6px;display:none;
}
.inv-save-msg.show{display:block;}
.inv-del-btn{
  border:1px solid #DDA8A0;color:#A02020;background:none;
  border-radius:6px;padding:3px 7px;
  font-size:10px;cursor:pointer;font-family:inherit;flex-shrink:0;
}

<script>
// SCRIPT_URL: Apps Script 서빙 시 자동 감지, GitHub Pages 시 하드코딩
var SCRIPT_URL = (function(){
  var loc = window.location.href;
  // Apps Script에서 열린 경우 (script.google.com)
  if(loc.indexOf('script.google.com') >= 0) {
    return loc.split('?')[0].split('#')[0];
  }
  // GitHub Pages에서 열린 경우
  return 'https://script.google.com/macros/s/AKfycbwFD3uRB8Da8DaLU2KHvGgyn4jrhaf6XFKXbmMMJpCf_n4eA9avi6KEeRs6InmxIcvpCg/exec';
})();

// ══════════════════════════════
// JSONP 유틸 (CORS 우회)
// Apps Script redirect 대응 - onerror 없이 timeout만 사용
// ══════════════════════════════
var _jsonpId = 0;
function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var cbName = '_jp_' + (++_jsonpId) + '_' + Date.now();
    var script = document.createElement('script');
    var done = false;
    var timeout = setTimeout(function() {
      if(done) return;
      done = true;
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      // timeout 시 fetch로 재시도
      fetch(url + (url.indexOf('?')>=0?'&':'?') + '_t=' + Date.now())
        .then(function(r){return r.json();})
        .then(resolve)
        .catch(reject);
    }, 8000);
    window[cbName] = function(data) {
      if(done) return;
      done = true;
      clearTimeout(timeout);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    script.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cbName;
    // onerror 제거 - Apps Script redirect 시 잘못 발동되므로
    document.head.appendChild(script);
  });
}

let allOrders = [];
let knownOrderNos = new Set();
let currentTab = 'all';
let isFirstLoad = true;
let audioCtx = null;

// ── 오디오 컨텍스트 초기화 (터치 후 활성화) ──
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
document.addEventListener('touchstart', initAudio, {once: true});
document.addEventListener('click', initAudio, {once: true});

// ── 음성 목록 미리 로드 (모바일 iOS 대응) ──
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    window.speechSynthesis.getVoices();
  };
}

// ── 알림음 재생 ──
function playAlert() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var now = audioCtx.currentTime;
    // 3음 차임벨
    [[523.25, 0], [659.25, 0.18], [783.99, 0.36]].forEach(function(note) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = note[0];
      gain.gain.setValueAtTime(0, now + note[1]);
      gain.gain.linearRampToValueAtTime(0.35, now + note[1] + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + note[1] + 0.55);
      osc.start(now + note[1]);
      osc.stop(now + note[1] + 0.6);
    });
  } catch(e) { console.log('audio error', e); }
}

// ── 음성 안내 (TTS) ──
function speakAlert(count) {
  try {
    if (!window.speechSynthesis) return;
    // 이전 음성 중단
    window.speechSynthesis.cancel();
    // 차임벨 후 0.8초 딜레이 후 음성 재생
    setTimeout(function() {
      var msg = new SpeechSynthesisUtterance();
      msg.text = '새로운 주문이 ' + count + '건 들어왔습니다.';
      msg.lang = 'ko-KR';
      msg.rate = 0.92;   // 속도 (1.0 기본)
      msg.pitch = 1.05;  // 음높이
      msg.volume = 1.0;  // 볼륨
      // 한국어 음성 우선 선택
      var voices = window.speechSynthesis.getVoices();
      var koVoice = voices.find(function(v) {
        return v.lang === 'ko-KR' || v.lang === 'ko_KR';
      });
      if (koVoice) msg.voice = koVoice;
      window.speechSynthesis.speak(msg);
    }, 900);
  } catch(e) { console.log('tts error', e); }
}

// ── 브라우저 푸시 알림 ──
function requestNotifyPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
function sendPushNotify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, {body: body, icon: ''});
  }
}

// ── 토스트 메시지 ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── 팝업 알림 ──
function showAlert(title, body) {
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertBody').innerHTML = body;
  document.getElementById('alertOverlay').classList.add('show');
}
function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
}

// ── 주문 불러오기 ──
function fetchOrders(manual) {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusTxt');
  dot.className = 'status-dot checking';
  txt.textContent = '확인 중...';

  // fetch 먼저 시도 (같은 도메인이면 바로 성공), 실패시 jsonp
  var apiUrl = SCRIPT_URL + '?action=list&t=' + Date.now();
  var doFetch = window.location.href.indexOf('script.google.com') >= 0
    ? fetch(apiUrl).then(function(r){return r.json();})
    : jsonp(apiUrl);
  doFetch
    .then(function(data) {
      if (data.result !== 'ok') throw new Error(data.message);

      dot.className = 'status-dot online';
      txt.textContent = '실시간 모니터링 중';

      var newOrders = [];
      if (!isFirstLoad) {
        data.orders.forEach(function(o) {
          if (o.status === 'NEW' && !knownOrderNos.has(o.orderNo + o.row)) {
            newOrders.push(o);
          }
        });
      }

      // 알려진 주문 업데이트
      knownOrderNos = new Set();
      data.orders.forEach(function(o) {
        knownOrderNos.add(o.orderNo + o.row);
      });

      allOrders = data.orders;
      isFirstLoad = false;

      renderOrders();
      updateBadge(data.newCount);

      if (newOrders.length > 0) {
        playAlert();
        speakAlert(newOrders.length);
        var names = newOrders.map(function(o){ return o.rcptName||'(이름없음)'; }).join(', ');
        sendPushNotify('🍐 새 주문 ' + newOrders.length + '건', names + ' 외 배송 주문');
        showAlert(
          '🍐 새 주문 ' + newOrders.length + '건 접수!',
          newOrders.map(function(o){
            return '<b>' + (o.senderName||'주문자') + '</b> → ' + (o.rcptName||'') + '<br>' + (o.product||'');
          }).join('<br><br>')
        );
      }

      if (manual) showToast('✓ 최신 주문을 불러왔어요');
      setTimeout(restoreLocalMemos, 100);
    })
    .catch(function(err) {
      dot.className = 'status-dot';
      txt.textContent = '연결 오류 - 재시도 중';
      console.error(err);
    });
}

// ── 배지 업데이트 ──
function updateBadge(count) {

}

// ── 탭 전환 ──
function switchTab(tab) {
  currentTab = tab;
  ['all','new','done','inv'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    if(el) el.classList.toggle('act', t===tab);
  });
  var orderList = document.getElementById('orderList');
  var invWrap   = document.getElementById('invWrap');
  if(tab === 'inv') {
    if(orderList) orderList.style.display = 'none';
    if(invWrap)   invWrap.style.display   = 'block';
    loadProducts();
  } else {
    if(orderList) orderList.style.display = 'block';
    if(invWrap)   invWrap.style.display   = 'none';
    renderOrders();
  }
}

// ── 주문 렌더링 ──
function renderOrders() {
  var list = document.getElementById('orderList');
  var filtered = allOrders.filter(function(o) {
    if (currentTab === 'new'  && o.status !== 'NEW')  return false;
    if (currentTab === 'done' && o.status !== 'DONE') return false;
    return orderMatchesDate(o);
  });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-ico">🍐</div><div class="empty-txt">' +
      (currentTab==='new' ? '새로운 주문이 없어요' : '주문 내역이 없어요') + '</div></div>';
    return;
  }

  // 날짜별 그룹핑
  var grouped = {};
  var groupOrder = [];
  filtered.forEach(function(o) {
    var dateKey = (o.submittedAt||'날짜 없음').slice(0,10);
    if (!grouped[dateKey]) { grouped[dateKey] = []; groupOrder.push(dateKey); }
    grouped[dateKey].push(o);
  });

  var html = '';
  groupOrder.forEach(function(dateKey) {
    // 날짜 헤더
    var label = dateKey;
    var today = toDateStr(new Date());
    var yd = new Date(); yd.setDate(yd.getDate()-1);
    if (dateKey === today) label = '오늘 · ' + dateKey;
    else if (dateKey === toDateStr(yd)) label = '어제 · ' + dateKey;
    html += '<div class="date-group-hd"><span>📅 ' + label + ' (' + grouped[dateKey].length + '건)</span></div>';

    grouped[dateKey].forEach(function(o) {
    var isNew  = o.status === 'NEW';
    var isDone = o.status === 'DONE';
    var timeStr = o.submittedAt ? o.submittedAt.slice(0,16) : '';
    html += '<div class="order-card ' + (isNew?'new':isDone?'done':'') + '" id="card-'+o.row+'">' +
      '<div class="card-hd ' + (isNew?'new':isDone?'done':'') + '">' +
        '<div class="card-hd-left">' +
          '<span class="card-status ' + (isNew?'new':'done') + '">' + (isNew?'신규':'확인완료') + '</span>' +
          '<span class="card-no">' + (o.orderIndex||'') + '</span>' +
        '</div>' +
        '<span class="card-time">' + timeStr + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-section">보내는 사람</div>' +
        '<div class="card-row"><span class="card-k">성명</span><span class="card-v">' + (o.senderName||'주문자') + '</span></div>' +
        '<div class="card-row"><span class="card-k">연락처</span><span class="card-v">' + (o.senderPhone||'-') + '</span></div>' +
        '<div class="card-section">받는 사람</div>' +
        '<div class="card-row"><span class="card-k">성명</span><span class="card-v">' + (o.rcptName||'-') + '</span></div>' +
        '<div class="card-row"><span class="card-k">연락처</span><span class="card-v">' + (o.rcptPhone||'-') + '</span></div>' +
        '<div class="card-row"><span class="card-k">주소</span><span class="card-v">' + (o.rcptAddr||'-') + '</span></div>' +
        '<div class="card-row"><span class="card-k">상품</span><span class="card-v"><span class="card-product">🍐 ' + (o.product||'-') + '</span><span class="card-price">₩ ' + calcPrice(o.product).toLocaleString() + '</span></span></div>' +
        (o.delivDate && o.delivDate!=='미지정' ? '<div class="card-row"><span class="card-k">배송일</span><span class="card-v">' + o.delivDate + '</span></div>' : '') +
        (o.memo && o.memo!=='없음' ? '<div class="card-row"><span class="card-k">요청</span><span class="card-v">' + o.memo + '</span></div>' : '') +
      '</div>' +
      '<div class="card-memo-wrap">'
        + '<div class="card-memo-label"><span>✏</span> 관리자 메모</div>'
        + '<textarea class="card-memo-input" id="memo-' + o.row + '" placeholder="배송 관련 메모, 고객 특이사항 등을 기재해 주세요..." onkeydown="if(event.key===\'Enter\'&&(event.ctrlKey||event.metaKey)){saveMemo(' + o.row + ');return false;}">' + (o.adminMemo||'') + '</textarea>'
        + '<div class="card-memo-row">'
          + '<button class="btn-memo-save" id="memo-btn-' + o.row + '" onclick="saveMemo(' + o.row + ')">💾 저장</button>'
          + '<div class="card-memo-saved" id="memo-ok-' + o.row + '">✓ 저장됨</div>'
        + '</div>'
      + '</div>'
      + '<div class="card-foot">' +
        (isNew
          ? '<button class="btn-confirm" onclick="confirmOrder(' + o.row + ', this)">✓ 확인 완료</button>'
          : '<div class="btn-confirmed">✓ 확인됨' + (o.confirmedAt ? '<div class="confirmed-time">' + o.confirmedAt + '</div>' : '') + '</div>'
        ) +

    }); // grouped forEach
  }); // groupOrder forEach
  list.innerHTML = html;
}

// ── 주문 확인 처리 ──
function confirmOrder(row, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중...';
  var _cUrl = SCRIPT_URL + '?action=confirm&row=' + row + '&t=' + Date.now();
  var _cFetch = window.location.href.indexOf('script.google.com') >= 0
    ? fetch(_cUrl).then(function(r){return r.json();})
    : jsonp(_cUrl);
  _cFetch
    .then(function(data) {
      if (data.result === 'ok') {
        showToast('✓ 주문을 확인 완료 처리했어요');
        fetchOrders(false);
      } else {
        btn.disabled = false;
        btn.textContent = '✓ 확인 완료';
        showToast('오류가 발생했어요. 다시 시도해 주세요.');
      }
    })
    .catch(function(){
      btn.disabled = false;
      btn.textContent = '✓ 확인 완료';
    });
}


// ── 상품 단가 & 금액 계산 ──
var PRICE_MAP = {
  '신고 9과':  50000,
  '신고 10과': 45000,
  '신고 11과': 40000,
  '신고 12과': 35000,
  '신고 13과': 30000
};
var DELIVERY = 4000; // 박스당 택배비

function parseProduct(productStr) {
  // "신고 10과 2박스" → {name:'신고 10과', qty:2}
  if (!productStr) return {name:'', qty:0};
  var match = productStr.match(/^(.+?)\s*(\d+)박스$/);
  if (match) return {name:match[1].trim(), qty:parseInt(match[2])};
  // 박스 표기 없으면 1박스
  return {name:productStr.trim(), qty:1};
}

function calcPrice(productStr) {
  var p = parseProduct(productStr);
  if (!p.name || !p.qty) return 0;
  var unitPrice = PRICE_MAP[p.name] || 0;
  return (unitPrice + DELIVERY) * p.qty;
}

// ── 매출 분석 모달 ──
function showSalesModal() {
  var content = document.getElementById('salesContent');
  content.innerHTML = buildSalesHTML();
  document.getElementById('salesOverlay').classList.add('show');
}

function closeSalesModal(e) {
  if (!e || e.target === document.getElementById('salesOverlay')) {
    document.getElementById('salesOverlay').classList.remove('show');
  }
}

function buildSalesHTML() {
  if (!allOrders || allOrders.length === 0) {
    return '<div style="text-align:center;padding:32px;color:#9A8870;font-size:13px;">주문 데이터가 없습니다.</div>';
  }

  // ── 집계 ──
  var totalBoxes  = 0;
  var totalAmount = 0;
  var productMap  = {};
  var validCount  = 0;

  allOrders.forEach(function(o) {
    if(!o.product || o.product === '-' || o.product === '') return;
    var p = parseProduct(o.product);
    if(!p.name || p.qty <= 0) return;
    var amt = calcPrice(o.product);
    validCount++;
    totalBoxes  += p.qty;
    totalAmount += amt;
    if (!productMap[p.name]) productMap[p.name] = {boxes:0, amount:0};
    productMap[p.name].boxes  += p.qty;
    productMap[p.name].amount += amt;
  });

  if (validCount === 0) {
    return '<div style="text-align:center;padding:32px;color:#9A8870;font-size:13px;">아직 주문 데이터가 없습니다.</div>';
  }

  var h = '';

  // ── 요약 카드 3개 ──
  h += '<div class="sales-summary">'
    + '<div class="sales-sum-card">'
      + '<div class="sales-sum-label">총 주문건수</div>'
      + '<div class="sales-sum-value">' + validCount + '</div>'
      + '<div class="sales-sum-unit">건</div>'
    + '</div>'
    + '<div class="sales-sum-card">'
      + '<div class="sales-sum-label">총 박스수</div>'
      + '<div class="sales-sum-value">' + totalBoxes + '</div>'
      + '<div class="sales-sum-unit">박스</div>'
    + '</div>'
    + '<div class="sales-sum-card">'
      + '<div class="sales-sum-label">총 매출</div>'
      + '<div class="sales-sum-value" style="font-size:13px;">' + totalAmount.toLocaleString() + '</div>'
      + '<div class="sales-sum-unit">원 (택배비 포함)</div>'
    + '</div>'
  + '</div>';

  // ── 상품별 집계 테이블 ──
  var prodOrder = ['신고 9과','신고 10과','신고 11과','신고 12과','신고 13과'];
  h += '<div class="sales-section-title">상품별 집계</div>';
  h += '<div class="sales-table-wrap"><table class="sales-table">'
    + '<thead><tr>'
      + '<th>상품</th><th>단가</th><th>택배비</th><th>박스수</th><th>소계</th>'
    + '</tr></thead><tbody>';

  var tableTotal = 0;
  var tableTotalBoxes = 0;

  prodOrder.forEach(function(name) {
    if (!productMap[name]) return;
    var d = productMap[name];
    var unitPrice = PRICE_MAP[name] || 0;
    tableTotal += d.amount;
    tableTotalBoxes += d.boxes;
    h += '<tr>'
      + '<td>' + name + '</td>'
      + '<td>' + unitPrice.toLocaleString() + '원</td>'
      + '<td>' + DELIVERY.toLocaleString() + '원</td>'
      + '<td>' + d.boxes + '박스</td>'
      + '<td class="highlight">' + d.amount.toLocaleString() + '원</td>'
    + '</tr>';
  });

  // 기타 상품
  Object.keys(productMap).forEach(function(name) {
    if (prodOrder.indexOf(name) >= 0 || !name) return;
    var d = productMap[name];
    tableTotal += d.amount;
    tableTotalBoxes += d.boxes;
    h += '<tr>'
      + '<td>' + name + '</td>'
      + '<td>-</td>'
      + '<td>' + DELIVERY.toLocaleString() + '원</td>'
      + '<td>' + d.boxes + '박스</td>'
      + '<td class="highlight">' + d.amount.toLocaleString() + '원</td>'
    + '</tr>';
  });

  h += '<tr class="total-row">'
    + '<td colspan="3">합 계</td>'
    + '<td>' + tableTotalBoxes + '박스</td>'
    + '<td>' + tableTotal.toLocaleString() + '원</td>'
  + '</tr>';
  h += '</tbody></table></div>';

  return h;
}


// ── 관리자 메모 저장 (로컬) ──
function saveMemo(row) {
  var input = document.getElementById('memo-' + row);
  var btn   = document.getElementById('memo-btn-' + row);
  var ok    = document.getElementById('memo-ok-' + row);
  if (!input) return;

  var memoVal = input.value.trim();
  btn.disabled = true;
  btn.textContent = '저장 중...';

  // 로컬스토리지에 저장 (오프라인에서도 유지)
  try {
    var memos = JSON.parse(localStorage.getItem('gwangjin_memos') || '{}');
    memos['row_' + row] = memoVal;
    localStorage.setItem('gwangjin_memos', JSON.stringify(memos));
  } catch(e) {}

  // allOrders에도 반영
  allOrders.forEach(function(o) {
    if (o.row === row) o.adminMemo = memoVal;
  });

  // Apps Script에도 저장 시도
  var _mUrl = SCRIPT_URL + '?action=savememo&row=' + row + '&memo=' + encodeURIComponent(memoVal) + '&t=' + Date.now();
  var _mFetch = window.location.href.indexOf('script.google.com') >= 0
    ? fetch(_mUrl).then(function(r){return r.json();})
    : jsonp(_mUrl);
  _mFetch
    .catch(function(){}) // 실패해도 로컬은 저장됨
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '💾 저장';
      ok.classList.add('show');
      setTimeout(function(){ ok.classList.remove('show'); }, 2500);
    });
}

// ── 로컬 메모 복원 (페이지 로드 시) ──
function restoreLocalMemos() {
  try {
    var memos = JSON.parse(localStorage.getItem('gwangjin_memos') || '{}');
    Object.keys(memos).forEach(function(key) {
      var row = key.replace('row_', '');
      var el  = document.getElementById('memo-' + row);
      if (el && !el.value) el.value = memos[key];
    });
  } catch(e) {}
}


// ── 날짜 필터 상태 ──
var dateFilterFrom = '';
var dateFilterTo   = '';

function toggleDatePanel() {
  var panel   = document.getElementById('datePanel');
  var overlay = document.getElementById('datePanelOverlay');
  var isOpen  = panel.style.display !== 'none';
  panel.style.display   = isOpen ? 'none' : 'block';
  overlay.classList.toggle('show', !isOpen);
  document.getElementById('btnDateFilter').classList.toggle('active', !isOpen);
}
function closeDatePanel() {
  document.getElementById('datePanel').style.display = 'none';
  document.getElementById('datePanelOverlay').classList.remove('show');
  document.getElementById('btnDateFilter').classList.remove('active');
}

function setQuickDate(type, btn) {
  document.querySelectorAll('.dqb').forEach(function(b){ b.classList.remove('sel'); });
  btn.classList.add('sel');
  var now   = new Date();
  var today = toDateStr(now);
  if (type === 'today') {
    document.getElementById('dateFrom').value = today;
    document.getElementById('dateTo').value   = today;
  } else if (type === 'yesterday') {
    var yd = new Date(now); yd.setDate(yd.getDate()-1);
    var ydStr = toDateStr(yd);
    document.getElementById('dateFrom').value = ydStr;
    document.getElementById('dateTo').value   = ydStr;
  } else if (type === 'week') {
    var mon = new Date(now);
    mon.setDate(mon.getDate() - (mon.getDay()||7) + 1);
    document.getElementById('dateFrom').value = toDateStr(mon);
    document.getElementById('dateTo').value   = today;
  } else if (type === 'month') {
    document.getElementById('dateFrom').value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    document.getElementById('dateTo').value   = today;
  } else if (type === 'all') {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
  }
}

function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function applyDateFilter() {
  dateFilterFrom = document.getElementById('dateFrom').value;
  dateFilterTo   = document.getElementById('dateTo').value;
  closeDatePanel();
  updateDateBadge();
  renderOrders();
}

function resetDateFilter() {
  dateFilterFrom = '';
  dateFilterTo   = '';
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value   = '';
  document.querySelectorAll('.dqb').forEach(function(b){ b.classList.remove('sel'); });
  closeDatePanel();
  updateDateBadge();
  renderOrders();
}

function updateDateBadge() {
  var badge = document.getElementById('dateBadge');
  var btn   = document.getElementById('btnDateFilter');
  if (dateFilterFrom || dateFilterTo) {
    badge.classList.add('show');
    btn.style.borderColor = 'rgba(106,144,80,.7)';
    btn.style.color = '#88B068';
  } else {
    badge.classList.remove('show');
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

function orderMatchesDate(o) {
  if (!dateFilterFrom && !dateFilterTo) return true;
  var dateStr = (o.submittedAt||'').slice(0,10); // "YYYY-MM-DD"
  if (!dateStr) return true;
  if (dateFilterFrom && dateStr < dateFilterFrom) return false;
  if (dateFilterTo   && dateStr > dateFilterTo)   return false;
  return true;
}


// ══════════════════════════════
// 재고 관리
// ══════════════════════════════
var localProducts = [];  // 로컬 상품 목록 (수정 중)

// 상품 목록 불러오기
function loadProducts() {
  var listEl = document.getElementById('invProductList');
  if(!listEl) return;
  listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#9A8870;font-size:13px;">불러오는 중...</div>';

  var _pUrl = SCRIPT_URL + '?action=getproducts&t=' + Date.now();
  var _pFetch = window.location.href.indexOf('script.google.com') >= 0
    ? fetch(_pUrl).then(function(r){return r.json();})
    : jsonp(_pUrl);
  _pFetch
    .then(function(data){
      if(data.result !== 'ok') throw new Error(data.message);
      localProducts = data.products || [];
      renderProductList();
    })
    .catch(function(err){
      listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#C03020;font-size:13px;">불러오기 실패</div>';
    });
}

// 상품 목록 렌더링
function renderProductList() {
  var listEl = document.getElementById('invProductList');
  if(!listEl) return;
  if(localProducts.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#9A8870;font-size:13px;">등록된 상품이 없습니다.</div>';
    return;
  }
  var rows = localProducts.map(function(p, i) {
    var stockClass = p.stock <= 0 ? 'zero' : p.stock <= 10 ? 'low' : 'ok';
    var stockLabel = p.stock <= 0 ? '품절' : p.stock <= 10 ? '부족' : '정상';
    var visOn = p.visible ? 'on' : 'off';
    var div = document.createElement('div');
    div.className = 'inv-row';
    div.innerHTML =
      '<div class="inv-row-left">'
        + '<div class="inv-prod-name">'
          + '<input data-i="'+i+'" data-f="name" class="inv-inline-input" style="border:none;background:none;font-size:14px;font-weight:700;color:var(--br);width:100%;font-family:inherit;padding:0;outline:none;" value="'+escHtml(p.name)+'">'
        + '</div>'
        + '<div class="inv-prod-price">'
          + '단가 <input data-i="'+i+'" data-f="price" class="inv-inline-input" type="number" style="border:none;background:none;font-size:11px;color:var(--ts);width:60px;font-family:inherit;padding:0;outline:none;" value="'+p.price+'">'
          + '원 · 택배 <input data-i="'+i+'" data-f="delivery" class="inv-inline-input" type="number" style="border:none;background:none;font-size:11px;color:var(--ts);width:46px;font-family:inherit;padding:0;outline:none;" value="'+p.delivery+'">'
          + '원'
        + '</div>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">'
        + '<div class="inv-stock-ctrl">'
          + '<button class="inv-stock-btn" data-i="'+i+'" data-d="-1" onclick="stockStepBtn(this)">−</button>'
          + '<input class="inv-stock-input" data-i="'+i+'" data-f="stock" type="number" value="'+p.stock+'" min="0" id="stock-input-'+i+'">'
          + '<button class="inv-stock-btn" data-i="'+i+'" data-d="1" onclick="stockStepBtn(this)">＋</button>'
        + '</div>'
        + '<span class="inv-stock-badge '+stockClass+'">'+stockLabel+'</span>'
        + '<button class="inv-visible-toggle '+visOn+'" data-i="'+i+'" id="vis-btn-'+i+'" onclick="toggleVisible('+i+')"></button>'
        + '<button class="inv-del-btn" data-i="'+i+'" onclick="delProduct('+i+')">✕</button>'
      + '</div>';
    // 인라인 input 이벤트 (onchange 대신 addEventListener)
    div.querySelectorAll && setTimeout(function(){
      var inputs = listEl.querySelectorAll('.inv-inline-input');
      inputs.forEach(function(inp){
        inp.onchange = function(){
          var fi = parseInt(this.getAttribute('data-i'));
          var ff = this.getAttribute('data-f');
          updateProd(fi, ff, this.value);
        };
      });
    }, 0);
    return div;
  });
  listEl.innerHTML = '';
  rows.forEach(function(r){ if(r) listEl.appendChild(r); });
  // 이벤트 바인딩
  listEl.querySelectorAll('.inv-inline-input').forEach(function(inp){
    inp.onchange = function(){
      var fi = parseInt(this.getAttribute('data-i'));
      var ff = this.getAttribute('data-f');
      updateProd(fi, ff, this.value);
    };
  });
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function stockStepBtn(btn){
  var i = parseInt(btn.getAttribute('data-i'));
  var d = parseInt(btn.getAttribute('data-d'));
  stockStep(i, d);
}


// 재고 +/- 버튼
function stockStep(i, delta) {
  var p = localProducts[i];
  if(!p) return;
  p.stock = Math.max(0, (parseInt(p.stock)||0) + delta);
  var inp = document.getElementById('stock-input-' + i);
  if(inp) inp.value = p.stock;
  renderProductList();
}

// 필드 업데이트
function updateProd(i, field, val) {
  if(!localProducts[i]) return;
  if(field === 'price' || field === 'delivery' || field === 'stock') {
    localProducts[i][field] = Math.max(0, parseInt(val)||0);
  } else {
    localProducts[i][field] = val;
  }
}

// 표시 여부 토글
function toggleVisible(i) {
  if(!localProducts[i]) return;
  localProducts[i].visible = !localProducts[i].visible;
  var btn = document.getElementById('vis-btn-' + i);
  if(btn) {
    btn.classList.toggle('on', localProducts[i].visible);
    btn.classList.toggle('off', !localProducts[i].visible);
  }
}

// 상품 삭제
function delProduct(i) {
  if(!confirm('"' + localProducts[i].name + '" 을 삭제할까요?')) return;
  localProducts.splice(i, 1);
  renderProductList();
}

// 신규 상품 추가
function addProduct() {
  var name     = (document.getElementById('newProdName').value||'').trim();
  var price    = parseInt(document.getElementById('newProdPrice').value)||0;
  var delivery = parseInt(document.getElementById('newProdDelivery').value)||4000;
  var stock    = parseInt(document.getElementById('newProdStock').value)||999;
  if(!name) { alert('상품명을 입력해 주세요.'); return; }
  localProducts.push({name:name, price:price, delivery:delivery, stock:stock, visible:true});
  document.getElementById('newProdName').value = '';
  document.getElementById('newProdPrice').value = '';
  document.getElementById('newProdStock').value = '999';
  renderProductList();
  showToast('✓ "' + name + '" 상품이 추가되었습니다. 저장 버튼을 눌러주세요.');
}

// 상품 저장
function saveProducts() {
  var btn = document.querySelector('.btn-inv-save');
  if(btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  var _sUrl = SCRIPT_URL + '?action=saveproducts&data=' + encodeURIComponent(JSON.stringify(localProducts)) + '&t=' + Date.now();
  var _sFetch = window.location.href.indexOf('script.google.com') >= 0
    ? fetch(_sUrl).then(function(r){return r.json();})
    : jsonp(_sUrl);
  _sFetch
    .then(function(data){
      if(data.result === 'ok') {
        showToast('✓ 상품 목록이 저장되었습니다!');
        var msg = document.getElementById('invSaveMsg');
        if(msg){ msg.classList.add('show'); setTimeout(function(){ msg.classList.remove('show'); }, 2500); }
      } else {
        showToast('저장 실패: ' + (data.message||'오류'));
      }
    })
    .catch(function(){ showToast('저장 실패 - 네트워크 오류'); })
    .finally(function(){
      if(btn){ btn.disabled = false; btn.textContent = '💾 변경사항 저장'; }
    });
}

// ── 자동 폴링 (30초마다) ──
function startPolling() {
  fetchOrders(false);
  setInterval(function(){ fetchOrders(false); }, 30000);
}

// ── 초기화 ──
requestNotifyPermission();
startPolling();
</script>
